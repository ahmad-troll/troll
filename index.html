<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سؤال مهم</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-top: 15vh; 
            /* Dramatic dark red to black vignette background */
            background: radial-gradient(circle, #2a0000 0%, #000000 100%); 
            color: white;
            height: 100vh;
            overflow: hidden; 
        }
        
        h1 { 
            font-size: 3em; 
            padding: 0 15px; 
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.9); /* Glowing red aura */
            letter-spacing: 1px;
        }
        
        #timer {
            display: none;
            color: #ff3333;
            font-size: 55px;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: monospace;
            text-shadow: 0 0 20px red, 0 0 40px darkred;
            animation: pulse 0.8s infinite alternate; /* Alarm pulse effect */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .button-container { position: relative; height: 300px; margin-top: 30px; }
        
        button { 
            font-size: 26px; 
            padding: 15px 45px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        
        #btn-yes { 
            background: linear-gradient(45deg, #1b5e20, #4CAF50); 
            color: white; 
            margin-bottom: 20px; 
            position: relative; 
            z-index: 10; 
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }
        
        #btn-no { 
            background: linear-gradient(45deg, #b71c1c, #f44336); 
            color: white; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 5; 
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
        }
        
        #message { margin-top: 50px; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px currentColor; }
        
        #gif-screen {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
        }
        #gif-screen img { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* More violent screen shake */
        @keyframes shake {
            0% { transform: translate(3px, 3px) rotate(0deg); }
            20% { transform: translate(-4px, 0px) rotate(3deg); }
            40% { transform: translate(4px, -3px) rotate(-3deg); }
            60% { transform: translate(-4px, 3px) rotate(0deg); }
            80% { transform: translate(4px, -3px) rotate(3deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

    <div id="gif-screen">
        <img src="goofy-silly.gif" alt="Troll GIF">
    </div>

    <div id="main-content">
        <div id="timer">10</div>
        <h1>هل تحب إيمان؟</h1>
        
        <div class="button-container">
            <button id="btn-yes" onclick="answerYes()">نعم</button>
            <br>
            <button id="btn-no" ontouchstart="moveNoButton(event)" onmouseover="moveNoButton(event)">لا</button>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        let audioCtx = null;
        let yesScale = 1;
        let timerStarted = false;
        let timeRemaining = 10;
        let countdownInterval;
        let gifTimeout;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playErrorSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Lowered frequency for a more intimidating, deeper buzzer sound
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(70, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4); 
        }

        function answerYes() {
            if (timerStarted) {
                clearInterval(countdownInterval);
                clearTimeout(gifTimeout);
                document.getElementById('timer').style.display = 'none';
            }

            document.getElementById('message').innerText = 'غصباً عنك! 😎';
            document.getElementById('message').style.color = '#4CAF50';
            document.getElementById('btn-no').style.display = 'none'; 
        }

        function moveNoButton(e) {
            e.preventDefault(); 
            
            if (!timerStarted) {
                timerStarted = true;
                const timerElement = document.getElementById('timer');
                timerElement.style.display = 'block';
                
                countdownInterval = setInterval(() => {
                    timeRemaining--;
                    if (timeRemaining > 0) {
                        timerElement.innerText = timeRemaining;
                    } else {
                        clearInterval(countdownInterval);
                    }
                }, 1000);

                gifTimeout = setTimeout(() => {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('gif-screen').style.display = 'block';
                }, 10000);
            }

            playErrorSound();
            
            const btn = document.getElementById('btn-no');
            const yesBtn = document.getElementById('btn-yes');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth; 
            document.body.classList.add('shake');
            
            document.getElementById('message').innerText = 'خطأ... حاول مرة أخرى!';
            document.getElementById('message').style.color = '#ff5252';
            
            const maxX = window.innerWidth - btn.offsetWidth;
            const maxY = window.innerHeight - btn.offsetHeight - 100;
            const x = Math.max(0, Math.random() * maxX);
            const y = Math.max(180, Math.random() * maxY); 
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'none'; 
            
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
        }
    </script>

</body>
</html>
