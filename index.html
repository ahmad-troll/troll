<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeanBoozled Glücksrad</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #e6c825; /* Hintergrundfarbe ähnlich der Verpackung */
    font-family: sans-serif;
    margin-top: 50px;
  }
  .wheel-container {
    position: relative;
    width: 450px;
    height: 450px;
  }
  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid #2874a6; /* Blauer Rand */
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
  }
  .arrow-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px; /* Radius des Pfeils */
    height: 200px;
    z-index: 10;
    pointer-events: none;
    /* Der Ursprung für die Drehung liegt exakt in der Mitte */
    transform-origin: center center;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); /* Weiches Ausrollen */
  }
  .arrow {
    position: absolute;
    top: -10px; 
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 120px solid #222; /* Farbe und Länge des Pfeils */
  }
  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 45px;
    height: 45px;
    background-color: #222;
    border-radius: 50%;
    z-index: 11;
  }
  button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 20px;
    cursor: pointer;
    background-color: #fff;
    border: 3px solid #333;
    border-radius: 8px;
    font-weight: bold;
    box-shadow: 3px 3px 0px #333;
    transition: all 0.1s;
  }
  button:active {
    box-shadow: 0px 0px 0px #333;
    transform: translate(3px, 3px);
  }
</style>
</head>
<body>

<div class="wheel-container">
  <canvas id="wheel" width="600" height="600"></canvas>
  <div class="arrow-container" id="arrow-box">
    <div class="arrow"></div>
  </div>
  <div class="center-circle"></div>
</div>

<button onclick="spinWheel()">Drehen!</button>

<script>
  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");

  // Daten basierend auf dem hochgeladenen Bild
  const segments = [
    { color: "#3e2a70", text1: "Pomegranate?", text2: "Old Bandage?" },
    { color: "#2b2b2b", text1: "Toasted Marshmallow?", text2: "Stink Bug?" },
    { color: "#b92b40", text1: "Cappuccino?", text2: "Liver & Onions?" },
    { color: "#54a3d6", text1: "Buttered Popcorn?", text2: "Rotten Egg?", textColor: "#000" },
    { color: "#d58835", text1: "Juicy Pear?", text2: "Booger?" },
    { color: "#47286d", text1: "Strawberry Banana?", text2: "Dead Fish?" },
    { color: "#1a5b9b", text1: "Berry Blue?", text2: "Toothpaste?" },
    { color: "#df293f", text1: "Birthday Cake?", text2: "Dirty Dishwater?" },
    { color: "#74bdf3", text1: "Peach?", text2: "Barf?", textColor: "#000" },
    { color: "#d08538", text1: "Tutti-Fruitti?", text2: "Stinky Socks?" }
  ];

  const numSegments = segments.length;
  const arc = Math.PI * 2 / numSegments;
  let currentRotation = 0;

  function drawWheel() {
    ctx.clearRect(0, 0, 600, 600);
    // Mittelpunkt verschieben
    ctx.translate(300, 300);

    for (let i = 0; i < numSegments; i++) {
      const angle = i * arc;
      
      // Segment zeichnen
      ctx.beginPath();
      ctx.arc(0, 0, 300, angle, angle + arc, false);
      ctx.lineTo(0, 0);
      ctx.fillStyle = segments[i].color;
      ctx.fill();
      ctx.stroke();

      // Text einfügen
      ctx.save();
      ctx.fillStyle = segments[i].textColor || "#ffffff";
      // Text an der korrekten Position im Segment drehen
      ctx.translate(Math.cos(angle + arc / 2) * 190, Math.sin(angle + arc / 2) * 190);
      ctx.rotate(angle + arc / 2 + Math.PI / 2);
      ctx.textAlign = "center";
      ctx.font = "bold 16px Arial";
      ctx.fillText(segments[i].text1, 0, -12);
      ctx.fillText(segments[i].text2, 0, 12);
      ctx.restore();
    }
    // Mittelpunkt zurücksetzen
    ctx.translate(-300, -300);
  }

  // Initiale Zeichnung des Rads
  drawWheel();

  function spinWheel() {
    const arrowBox = document.getElementById('arrow-box');
    // Generiert eine zufällige Drehung (mindestens 5 bis 10 Umdrehungen)
    const randomRotation = Math.floor(Math.random() * 3600) + 1800; 
    currentRotation += randomRotation;
    
    // Pfeil drehen
    arrowBox.style.transform = `translate(-50%, -50%) rotate(${currentRotation}deg)`;
  }
</script>
</body>
</html>
