<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سؤال مهم</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 15vh; 
            background-color: #f0f0f0; 
            overflow: hidden; 
        }
        h1 { color: #333; font-size: 2.5em; padding: 0 15px; }
        
        #timer {
            display: none;
            color: red;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .button-container { position: relative; height: 300px; margin-top: 20px; }
        button { 
            font-size: 24px; 
            padding: 15px 40px; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            transition: transform 0.2s; 
        }
        #btn-yes { background-color: #4CAF50; color: white; margin-bottom: 20px; position: relative; z-index: 10; }
        #btn-no { background-color: #f44336; color: white; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        #message { margin-top: 50px; font-size: 24px; font-weight: bold; }
        
        #gif-screen {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
        }
        /* This line forces the GIF to stretch and cover the entire screen */
        #gif-screen img { width: 100vw; height: 100vh; object-fit: cover; }
        
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            40% { transform: translate(3px, -2px) rotate(-2deg); }
            60% { transform: translate(-3px, 2px) rotate(0deg); }
            80% { transform: translate(3px, -2px) rotate(2deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>

    <div id="gif-screen">
        <img src="goofy-silly.gif" alt="Troll GIF">
    </div>

    <div id="main-content">
        <div id="timer">10</div>
        <h1>هل تحب إيمان؟</h1>
        
        <div class="button-container">
            <button id="btn-yes" onclick="answerYes()">نعم</button>
            <br>
            <button id="btn-no" ontouchstart="moveNoButton(event)" onmouseover="moveNoButton(event)">لا</button>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        let audioCtx = null;
        let yesScale = 1;
        let timerStarted = false;
        let timeRemaining = 10;
        let countdownInterval;
        let gifTimeout;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playErrorSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3); 
        }

        function answerYes() {
            if (timerStarted) {
                clearInterval(countdownInterval);
                clearTimeout(gifTimeout);
                document.getElementById('timer').style.display = 'none';
            }

            document.getElementById('message').innerText = 'غصباً عنك! 😎';
            document.getElementById('message').style.color = '#4CAF50';
            document.getElementById('btn-no').style.display = 'none'; 
        }

        function moveNoButton(e) {
            e.preventDefault(); 
            
            if (!timerStarted) {
                timerStarted = true;
                const timerElement = document.getElementById('timer');
                timerElement.style.display = 'block';
                
                countdownInterval = setInterval(() => {
                    timeRemaining--;
                    if (timeRemaining > 0) {
                        timerElement.innerText = timeRemaining;
                    } else {
                        clearInterval(countdownInterval);
                    }
                }, 1000);

                gifTimeout = setTimeout(() => {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('gif-screen').style.display = 'block';
                }, 10000);
            }

            playErrorSound();
            
            const btn = document.getElementById('btn-no');
            const yesBtn = document.getElementById('btn-yes');
            
            document.body.classList.remove('shake');
            void document.body.offsetWidth; 
            document.body.classList.add('shake');
            
            document.getElementById('message').innerText = 'خطأ... حاول مرة أخرى!';
            document.getElementById('message').style.color = '#f44336';
            
            const maxX = window.innerWidth - btn.offsetWidth;
            const maxY = window.innerHeight - btn.offsetHeight - 100;
            const x = Math.max(0, Math.random() * maxX);
            const y = Math.max(150, Math.random() * maxY); 
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'none'; 
            
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
        }
    </script>

</body>
</html>
