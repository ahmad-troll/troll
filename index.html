<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سؤال مهم</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-top: 15vh; 
            background: radial-gradient(circle, #2a0000 0%, #000000 100%); 
            color: white;
            height: 100vh;
            overflow: hidden; 
        }
        
        h1 { font-size: 3em; padding: 0 15px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255, 0, 0, 0.9); }
        
        #timer {
            display: none; color: #ff3333; font-size: 55px; font-weight: bold;
            margin-bottom: 15px; font-family: monospace;
            text-shadow: 0 0 20px red, 0 0 40px darkred;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        #message { margin: 20px 0; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px currentColor; min-height: 40px; }
        
        .button-container { position: relative; height: 300px; margin-top: 20px; }
        
        button { 
            font-size: 26px; padding: 15px 45px; cursor: pointer; 
            border: none; border-radius: 8px; font-weight: bold;
            transition: box-shadow 0.2s; 
        }
        
        #btn-yes { 
            background: linear-gradient(45deg, #1b5e20, #4CAF50); 
            color: white; position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; 
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }
        
        #btn-no { 
            background: linear-gradient(45deg, #b71c1c, #f44336); 
            color: white; position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 5; 
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
        }
        
        #gif-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; z-index: 9999;
        }
        #gif-screen img { width: 100vw; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <div id="gif-screen">
        <img src="goofy-silly.gif" alt="Troll GIF">
    </div>

    <div id="main-content">
        <div id="timer">10</div>
        <h1 id="question-text">هل تحب إيمان؟</h1>
        
        <div id="message"></div>
        
        <div class="button-container" id="buttons">
            <button id="btn-yes" onclick="answerYes()">نعم</button>
            <button id="btn-no" onclick="triggerTrap()">لا</button>
        </div>
    </div>

    <script>
        let timerStarted = false;
        let timeRemaining = 10;
        let countdownInterval, gifTimeout, moveYesInterval;
        
        // The code now looks exactly for your "dramatic.mp3" file
        let dramaticAudio = new Audio('dramatic.mp3');
        dramaticAudio.loop = true;

        function triggerTrap() {
            if (timerStarted) return; 
            timerStarted = true;
            
            document.getElementById('message').innerText = 'تحذير! النظام في خطر!';
            document.getElementById('message').style.color = '#ff5252';
            
            const timerElement = document.getElementById('timer');
            timerElement.style.display = 'block';
            
            dramaticAudio.play().catch(e => console.log("Audio blockiert:", e));
            
            countdownInterval = setInterval(() => {
                timeRemaining--;
                timerElement.innerText = timeRemaining;
                if (timeRemaining <= 0) clearInterval(countdownInterval);
            }, 1000);

            gifTimeout = setTimeout(() => {
                clearInterval(moveYesInterval);
                dramaticAudio.pause(); 
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('gif-screen').style.display = 'block';
            }, 10000);

            const yesBtn = document.getElementById('btn-yes');
            moveYesInterval = setInterval(() => {
                const maxX = window.innerWidth - yesBtn.offsetWidth;
                const maxY = window.innerHeight - yesBtn.offsetHeight - 150;
                
                yesBtn.style.position = 'fixed';
                yesBtn.style.left = Math.max(0, Math.random() * maxX) + 'px';
                yesBtn.style.top = Math.max(150, Math.random() * maxY) + 'px';
                yesBtn.style.transform = 'none'; 
            }, 500);
        }

        function answerYes() {
            if (timerStarted) {
                clearInterval(countdownInterval);
                clearTimeout(gifTimeout);
                clearInterval(moveYesInterval);
                dramaticAudio.pause(); 
                document.getElementById('timer').style.display = 'none';
            }

            document.getElementById('question-text').style.display = 'none';
            document.getElementById('buttons').style.display = 'none';

            const msg = document.getElementById('message');
            msg.innerText = 'غصباً عنك! 😎';
            msg.style.color = '#4CAF50';
            msg.style.fontSize = '60px';
            msg.style.position = 'absolute';
            msg.style.top = '50%';
            msg.style.left = '50%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.margin = '0';
            msg.style.width = '100%';
        }
    </script>

</body>
</html>
